spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:h2:mem:jobtrackr;DB_CLOSE_DELAY=-1;MODE=PostgreSQL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:sa}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}
spring.datasource.driver-class-name=org.h2.Driver

# H2 Console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console


spring.security.filter.order=10
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.database-platform=${SPRING_JPA_DATABASE_PLATFORM:org.hibernate.dialect.H2Dialect}

jwt.secret=${JWT_SECRET:am9idHJhY2tyX3N1cGVyX3NlY3JldF9rZXlfY2hhbmdlX2luX3Byb2R1Y3Rpb25fMjAyNA==}
jwt.expiration=86400000

app.cors.allowed-origin=${CORS_ALLOWED_ORIGIN:http://localhost:5173}

server.port=${PORT:8080}

# Frontend URL
app.frontend.url=http://localhost:5173

# Google OAuth2 Properties
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID:YOUR_GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET:YOUR_GOOGLE_CLIENT_SECRET}
spring.security.oauth2.client.registration.google.scope=profile,email